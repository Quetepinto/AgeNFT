name: Deploy dApp (GitHub Pages)

on:
  push:
    branches: [main, master]
    paths:
      - 'dapp/**'
      - 'docs/manifest/examples/unit-mainnet.json'
      - 'docs/manifest/examples/unit-1-lab.json'
      - 'scripts/dapp/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: runtime/package-lock.json

      - name: Install runtime deps (export script)
        run: cd runtime && npm ci

      - name: Export public budget snapshot
        run: node scripts/dapp/export-public-data.mjs
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload dApp artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dapp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
